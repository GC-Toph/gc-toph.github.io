<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简历生成器</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary: #164aac;
      --primary-dark: #002266;
      --accent: #60a5fa;
      --accent-soft: #dbeafe;
      --text: #111827;
      --muted: #6b7280;
      --bg: #eef2ff;
      --bg-2: #f8fafc;
      --card: #ffffff;
      --paper: #ffffff;
      --border: #e5e7eb;
      --ring: rgba(37, 99, 235, 0.16);
      --shadow-sm: 0 8px 22px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 30px 80px rgba(15, 23, 42, 0.20);
      --radius-xl: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 34%),
        radial-gradient(circle at 88% 12%, color-mix(in srgb, var(--primary) 20%, transparent), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .theme-blue {
      --primary: #164aac;
      --primary-dark: #002266;
      --accent: #60a5fa;
      --accent-soft: #dbeafe;
      --bg: #eef2ff;
      --bg-2: #f8fafc;
    }

    .theme-green {
      --primary: #059669;
      --primary-dark: #047857;
      --accent: #34d399;
      --accent-soft: #d1fae5;
      --bg: #ecfdf5;
      --bg-2: #f8fafc;
      --ring: rgba(5, 150, 105, 0.16);
    }

    .theme-purple {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --accent: #a78bfa;
      --accent-soft: #ede9fe;
      --bg: #f5f3ff;
      --bg-2: #faf5ff;
      --ring: rgba(124, 58, 237, 0.16);
    }

    .theme-dark {
      --primary: #111827;
      --primary-dark: #030712;
      --accent: #64748b;
      --accent-soft: #e5e7eb;
      --bg: #e5e7eb;
      --bg-2: #f8fafc;
      --ring: rgba(17, 24, 39, 0.15);
    }

    .theme-minimal {
      --primary: #18181b;
      --primary-dark: #09090b;
      --accent: #a1a1aa;
      --accent-soft: #f4f4f5;
      --bg: #fafafa;
      --bg-2: #f4f4f5;
      --ring: rgba(24, 24, 27, 0.12);
    }

    .app-shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      padding: 26px 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.62)),
        linear-gradient(135deg, color-mix(in srgb, var(--primary) 18%, transparent), transparent);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-sm);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 38%, transparent);
      filter: blur(4px);
    }

    .hero-title {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0;
      color: #0f172a;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 850;
    }

    .hero-icon {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 14px 30px var(--ring);
    }

    .hero-subtitle {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 12px 0 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.7;
    }

    .toolbar {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(226, 232, 240, 0.88);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 13px;
      font-weight: 750;
    }

    .form-control {
      width: 100%;
      border: 1px solid #dbe3ef;
      border-radius: 14px;
      padding: 11px 13px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      padding: 10px 15px;
      font-weight: 760;
      letter-spacing: -0.01em;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 14px 30px var(--ring);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.9);
      border-color: #dbe3ef;
      color: #334155;
    }

    .print-hint {
      margin-top: 14px;
      color: #64748b;
      font-size: 12.5px;
      line-height: 1.6;
    }

    .print-hint strong {
      color: var(--primary);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(640px, 1.08fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
      border: 1px solid rgba(226, 232, 240, 0.86);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid #e8eef7;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.78));
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: #0f172a;
      font-size: 16px;
      font-weight: 800;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #dbe3ef;
      border-radius: 999px;
      padding: 5px 10px;
      background: #fff;
      color: #64748b;
      font-size: 12px;
      font-weight: 650;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 840px;
      resize: vertical;
      border: 0;
      border-radius: 0;
      padding: 20px;
      background: linear-gradient(90deg, rgba(226, 232, 240, 0.42) 1px, transparent 1px) 0 0 / 36px 36px, #ffffff;
      color: #111827;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.8;
      outline: none;
    }

    .preview-panel {
      background: rgba(15, 23, 42, 0.06);
    }

    .preview-wrap {
      position: relative;
      height: 940px;
      overflow: auto;
      padding: 34px;
      background:
        linear-gradient(45deg, rgba(148, 163, 184, 0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(148, 163, 184, 0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(148, 163, 184, 0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(148, 163, 184, 0.12) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    /* ===== A4 一页紧凑版：参考中文简历模板优化 ===== */
    .resume-container {
      position: relative;
      width: 210mm;
      height: 297mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      isolation: isolate;
    }

    .resume-content {
      height: 297mm;
      padding: 9mm 10mm;
      font-size: 10.8px;
      line-height: 1.35;
      color: #111827;
    }

    .resume-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 7mm;
      padding: 0 0 5mm;
      margin-bottom: 4mm;
      border-bottom: 1.5px solid var(--primary);
    }

    .resume-header::after {
      content: "";
      position: absolute;
      left: 10mm;
      top: auto;
      bottom: -1.5px;
      width: 36mm;
      height: 2.2px;
      background: var(--primary-dark);
    }

    .resume-header .resume-body {
      width: 100%;
      min-width: 0;
    }

    .avatar {
      order: 2;
      grid-column: 2;
      grid-row: 1;
      width: 25mm;
      height: 32mm;
      border: 1px solid #d1d5db;
      box-shadow: 0 2px 7px rgba(15, 23, 42, 0.18);
      object-fit: cover;
      align-self: flex-start;
      display: none;
    }

    .avatar.visible {
      display: block;
    }

    .resume-body h1 {
      display: inline-block;
      min-width: 34mm;
      margin: 0 0 2.4mm;
      padding: 2.2mm 3mm;
      color: #fff;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary));
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0.02em;
      font-weight: 900;
    }

    .basic-info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 3mm;
      row-gap: 1.4mm;
      margin-top: 1.6mm;
    }

    .basic-info-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: baseline;
      gap: 1.2mm;
      padding: 0.6mm 1.2mm;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      line-height: 1.28;
      overflow: hidden;
    }

    .basic-info-label {
      color: #111827;
      font-weight: 900;
      white-space: nowrap;
    }

    .basic-info-value {
      color: #111827;
      font-weight: 560;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .resume-header p {
      display: none;
      /* 使用 grid 显示基础信息 */
    }

    .resume-header p.legacy-intro {
      display: block;
    }

    .resume-section {
      margin-bottom: 3.2mm;
    }

    .resume-body h2 {
      display: flex;
      align-items: center;
      gap: 2.2mm;
      margin: 4.2mm 0 2mm;
      padding: 0 0 1mm;
      color: var(--primary-dark);
      font-size: 14px;
      line-height: 1.15;
      font-weight: 900;
      border-bottom: 1.1px solid var(--primary);
    }

    .resume-section:first-child h2 {
      margin-top: 0;
    }

    .resume-body h2::before {
      content: "";
      width: 3.6mm;
      height: 3.6mm;
      background: var(--primary);
    }

    .resume-body h3 {
      margin: 2.2mm 0 1mm;
      color: #111827;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 850;
    }

    .resume-body p {
      margin: 1.2mm 0;
      color: #111827;
    }

    .resume-body ul {
      margin: 1.1mm 0 1.8mm;
      padding: 0;
      list-style: none;
    }

    .resume-body li {
      position: relative;
      margin: 0.65mm 0;
      padding-left: 3.4mm;
      color: #111827;
      line-height: 1.38;
    }

    .resume-body li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.69em;
      width: 1.4mm;
      height: 1.4mm;
      background: var(--primary);
      transform: translateY(-50%) rotate(45deg);
    }

    .resume-body strong {
      color: var(--primary-dark);
      font-weight: 900;
    }

    .resume-block {
      margin: 1.5mm 0 2.1mm;
    }

    .resume-block>p:first-child,
    .item-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 6mm;
      align-items: baseline;
      margin: 0 0 1mm;
      font-weight: 650;
    }

    .resume-date {
      color: #374151;
      font-weight: 850;
      white-space: nowrap;
      text-align: right;
    }

    .resume-role {
      margin-left: 5mm;
      color: #111827;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 1280px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }


    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
        /* 清除默认打印留白 */
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      html,
      body {
        background: #ffffff !important;
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }

      /* 隐藏与打印无关的 UI 元素 */
      .no-print {
        display: none !important;
      }

      .app-shell.no-print,
      .panel.no-print,
      .panel-head.no-print {
        display: none !important;
      }

      .app-shell {
        padding: 0 !important;
        margin: 0 !important;
        max-width: none !important;
      }

      .workspace {
        display: block !important;
        gap: 0 !important;
      }

      .preview-panel {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }

      .preview-wrap {
        height: auto !important;
        padding: 0 !important;
        background: transparent !important;
        overflow: visible !important;
      }

      .resume-container {
        width: 210mm !important;
        height: 297mm !important;
        min-height: 297mm !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        transform: none !important;
        overflow: hidden !important;
      }

      /* 微调打印时的文字缩放以完美适配一页 */
      .resume-content {
        padding: 9mm 10mm !important;
        font-size: 10.5px !important;
        line-height: 1.32 !important;
      }

      .resume-body h1 {
        font-size: 20px !important;
      }

      .resume-body h2 {
        font-size: 13.3px !important;
        margin-top: 3.4mm !important;
        margin-bottom: 1.7mm !important;
      }

      .resume-header {
        margin-bottom: 3.5mm !important;
        padding-bottom: 4mm !important;
      }

      .basic-info-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }
    }
  </style>
</head>

    <header class="hero">
      <h1 class="hero-title">
        <span class="hero-icon">✦</span>
        简历生成器

    </header>

    <section class="toolbar">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4 items-end">
        <div>
          <label class="field-label">默认模板</label>
          <select id="templateSelect" class="form-control">

        <div>

          <input id="avatarInput" type="file" accept="image/*" class="form-control" />

        <div class="flex gap-2">
          <button id="removeAvatarBtn" class="btn btn-secondary w-full" type="button">移除头像</button>

        <div class="flex gap-2">

          <button id="exportPdfBtn" class="btn btn-primary w-full" type="button">导出 PDF</button>
        </div>
      </div>

      <p class="print-hint">
        为了确保生成的 PDF 高清且能够自由复制文本，导出功能已切回浏览器系统打印。请在弹出窗口中选择 <strong>“另存为 PDF”</strong>，勾选 <strong>“背景图形”</strong>，并将边距设为
        <strong>“无”</strong>。
      </p>
    </section>
  </div>

  <div class="app-shell">
    <main class="workspace">
      <section class="panel no-print">
        <div class="panel-head">
          <h2 class="panel-title">Markdown 输入</h2>
          <span id="saveStatus" class="status-pill">已自动保存</span>
        </div>

        <textarea id="markdown" spellcheck="false"></textarea>
      </section>

      <section class="panel preview-panel">
        <div class="panel-head no-print">
          <h2 class="panel-title">简历预览</h2>
          <span class="status-pill">A4 PDF</span>
        </div>

        <div class="preview-wrap">
          <div id="preview" class="resume-container">
            <div class="resume-content">
              <div class="resume-header">
                <img id="avatarPreview" class="avatar" alt="头像" />
                <div id="resumeIntro" class="resume-body"></div>
              </div>
              <div id="resumeRest" class="resume-body"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

    });

    templateSelectEl.addEventListener("change", saveState);

    loadTemplateBtn.addEventListener("click", () => {
      const selected = templateSelectEl.value;
      const hasContent = markdownEl.value.trim().length > 0;

      if (hasContent) {
        const ok = confirm("载入模板会覆盖当前 Markdown 内容，确认继续？");
        if (!ok) return;
      }

      markdownEl.value = templates[selected] || templates.backend || "";
      renderResume();
      saveState();
    });

    clearBtn.addEventListener("click", () => {
      if (!confirm("确认清空当前 Markdown 内容？")) return;
      markdownEl.value = "";
      renderResume();
      saveState();
    });

    avatarInputEl.addEventListener("change", handleAvatarUpload);

    removeAvatarBtn.addEventListener("click", () => {
      avatarInputEl.value = "";
      avatarPreviewEl.removeAttribute("src");
      avatarPreviewEl.classList.remove("visible");
      saveState();
    });

    // ============================================
    // 调用原生浏览器打印功能，输出矢量+可选中PDF
    // ============================================
    exportPdfBtn.addEventListener("click", () => {
      const oldText = exportPdfBtn.textContent;
      exportPdfBtn.disabled = true;
      exportPdfBtn.textContent = "准备打印...";

      // 临时修改网页标题，让浏览器自动使用此标题作为 PDF 文件名
      const oldTitle = document.title;
      document.title = getResumeFileName();

      setTimeout(() => {
        window.print();

        // 打印对话框关闭后，还原状态
        document.title = oldTitle;
        exportPdfBtn.disabled = false;
        exportPdfBtn.textContent = oldText;
      }, 300);
    });

    function parseMarkdown(markdown) {
      if (window.marked && typeof marked.parse === "function") {
        return marked.parse(markdown);
      }
      return escapeHtml(markdown)
        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }

    function sanitizeHtml(html) {
      if (window.DOMPurify && typeof DOMPurify.sanitize === "function") {
        return DOMPurify.sanitize(html, PURIFY_CONFIG);
      }
      return html;
    }

    function hardenLinks(root) {
      root.querySelectorAll("a[href]").forEach(link => {
        const href = (link.getAttribute("href") || "").trim();
        if (/^javascript:/i.test(href)) {
          link.removeAttribute("href");
          return;
        }
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
      });
    }

    function renderResume() {
      const markdown = markdownEl.value.trim();

      resumeIntroEl.innerHTML = "";
      resumeRestEl.innerHTML = "";

      if (!markdown) {
        resumeIntroEl.innerHTML = '<h1>我的简历</h1><p class="legacy-intro">请在左侧输入 Markdown 内容，或点击“载入模板”。</p>';
        updateSaveStatus();
        return;
      }

      const rawHtml = parseMarkdown(markdown);
      const safeHtml = sanitizeHtml(rawHtml);

      const temp = document.createElement("div");
      temp.innerHTML = safeHtml;
      hardenLinks(temp);

      const firstH1 = temp.querySelector("h1");
      const introFragment = document.createDocumentFragment();
      const restHost = document.createElement("div");

      if (firstH1) {
        introFragment.appendChild(firstH1.cloneNode(true));

        let inBody = false;
        Array.from(temp.childNodes).forEach(node => {
          if (node === firstH1) return;

          if (node.nodeType === 1 && node.tagName === "H2") {
            inBody = true;
          }

          if (inBody) {
            restHost.appendChild(node.cloneNode(true));
          } else {
            introFragment.appendChild(node.cloneNode(true));
          }
        });
      } else {
        resumeIntroEl.innerHTML = '<h1>我的简历</h1><p class="legacy-intro">建议使用一级标题填写姓名，例如：# 张三</p>';
        Array.from(temp.childNodes).forEach(node => restHost.appendChild(node.cloneNode(true)));
      }

      if (firstH1) {
        resumeIntroEl.appendChild(introFragment);
        normalizeBasicInfo();
      }

      resumeRestEl.appendChild(wrapSections(restHost));
      polishResumeLayout();
      updateSaveStatus();
    }

    function wrapSections(sourceEl) {
      const fragment = document.createDocumentFragment();
      let currentSection = null;

      Array.from(sourceEl.childNodes).forEach(node => {
        if (node.nodeType === 1 && node.tagName === "H2") {
          currentSection = document.createElement("section");
          currentSection.className = "resume-section";
          currentSection.appendChild(node.cloneNode(true));
          fragment.appendChild(currentSection);
          return;
        }

        if (!currentSection) {
          currentSection = document.createElement("section");
          currentSection.className = "resume-section";
          fragment.appendChild(currentSection);
        }

        currentSection.appendChild(node.cloneNode(true));
      });

      Array.from(fragment.querySelectorAll(".resume-section")).forEach(section => {
        const itemCount = section.querySelectorAll("li").length;
        const textLength = section.textContent.length;

        if (itemCount > 8 || textLength > 750) {
          section.classList.add("long-section");
        }
        enhanceBlocks(section);
      });

      return fragment;
    }

    function enhanceBlocks(section) {
      const children = Array.from(section.childNodes);
      let block = null;

      children.forEach(node => {
        if (node.nodeType === 1 && node.tagName === "P" && node.querySelector("strong")) {
          block = document.createElement("div");
          block.className = "resume-block";
          section.insertBefore(block, node);
          block.appendChild(node);
          return;
        }

        if (block && node.nodeType === 1 && ["P", "UL"].includes(node.tagName)) {
          block.appendChild(node);
        } else {
          block = null;
        }
      });
    }

    function polishResumeLayout() {
      const datePattern = /((?:19|20)\d{2}[.\/-]\d{1,2}\s*(?:-|–|—|~|至)\s*(?:(?:19|20)\d{2}[.\/-]\d{1,2}|至今|Now|Present))/;

      document.querySelectorAll("#resumeRest .resume-block > p:first-child, #resumeRest section > p").forEach(p => {
        if (p.querySelector(".resume-date")) {
          p.classList.add("item-line");
          return;
        }

        const text = p.textContent || "";
        const match = text.match(datePattern);
        if (!match || !p.querySelector("strong")) return;

        const date = match[1];
        const escapedDate = date.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        p.innerHTML = p.innerHTML.replace(new RegExp(escapedDate), `<span class="resume-date">${date}</span>`);
        p.classList.add("item-line");
      });

      document.querySelectorAll("#resumeRest .resume-block > p:first-child, #resumeRest section > p.item-line").forEach(p => {
        if (!p.querySelector(".resume-date")) return;
        const dateEl = p.querySelector(".resume-date");
        const main = document.createElement("span");
        main.className = "item-title-main";
        Array.from(p.childNodes).forEach(node => {
          if (node !== dateEl) main.appendChild(node.cloneNode(true));
        });
        p.innerHTML = "";
        p.appendChild(main);
        p.appendChild(dateEl.cloneNode(true));
      });
    }

    function normalizeBasicInfo() {
      const h1 = resumeIntroEl.querySelector("h1");
      const nodes = Array.from(resumeIntroEl.childNodes).filter(node => node !== h1);
      const items = collectBasicInfoItems(nodes);

      nodes.forEach(node => node.remove());
      if (!items.length) return;

      const grid = document.createElement("div");
      grid.className = "basic-info-grid";

      items.forEach(item => {
        const parsed = parseBasicInfoItem(item);
        const box = document.createElement("div");
        box.className = "basic-info-item";

        const labelEl = document.createElement("span");
        labelEl.className = "basic-info-label";
        labelEl.textContent = parsed.label ? parsed.label.replace(/[：:]+$/, "") + "：" : "信息：";

        const valueEl = document.createElement("span");
        valueEl.className = "basic-info-value";
        valueEl.innerHTML = parsed.valueHtml || "-";

        box.appendChild(labelEl);
        box.appendChild(valueEl);
        grid.appendChild(box);
      });

      resumeIntroEl.appendChild(grid);
    }

    function collectBasicInfoItems(nodes) {
      const items = [];

      nodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          splitInfoHtml(escapeHtml(node.textContent)).forEach(item => items.push(item));
          return;
        }

        if (node.nodeType !== Node.ELEMENT_NODE) return;
        const tag = node.tagName;
        if (["SCRIPT", "STYLE"].includes(tag)) return;

        const html = tag === "P" || tag === "DIV" ? node.innerHTML : node.outerHTML;
        splitInfoHtml(html).forEach(item => items.push(item));
      });

      return items.map(item => item.trim()).filter(item => stripHtml(item).trim().length > 0);
    }

    function splitInfoHtml(html) {
      return html.replace(/<br\s*\/?\s*>/gi, "|").split(/\s*\|\s*/).map(item => item.trim()).filter(Boolean);
    }

    function parseBasicInfoItem(itemHtml) {
      const sanitized = sanitizeHtml(itemHtml).trim();
      const plain = stripHtml(sanitized).replace(/\s+/g, " ").trim();
      const colonMatch = plain.match(/[:：]/);

      if (!colonMatch) {
        return { label: "信息", valueHtml: sanitized };
      }

      const colonIndex = colonMatch.index;
      const label = plain.slice(0, colonIndex).replace(/^[-•·]+\s*/, "").trim();
      let valueHtml = sanitized
        .replace(/^\s*[-•·]+\s*/, "")
        .replace(/^\s*<strong>\s*[^<：:]+\s*<\/strong>\s*[:：]\s*/i, "")
        .replace(/^\s*<b>\s*[^<：:]+\s*<\/b>\s*[:：]\s*/i, "")
        .replace(/^\s*[^<：:]+\s*[:：]\s*/, "")
        .trim();

      if (!stripHtml(valueHtml).trim()) {
        valueHtml = escapeHtml(plain.slice(colonIndex + 1).trim());
      }

      return { label, valueHtml };
    }

    function stripHtml(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      return div.textContent || div.innerText || "";
    }

    function escapeHtml(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function handleAvatarUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        alert("请上传图片文件。");
        return;
      }

      if (file.size > 2 * 1024 * 1024) {
        alert("图片不能超过 2MB。");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        avatarPreviewEl.src = reader.result;
        avatarPreviewEl.classList.add("visible");
        saveState();
      };
      reader.readAsDataURL(file);
    }

    function applyTheme(theme) {
      const nextTheme = THEME_CLASSES.includes(theme) ? theme : "theme-blue";
      document.body.classList.remove(...THEME_CLASSES);
      document.body.classList.add(nextTheme);
      themeSelectEl.value = nextTheme;
    }

    function saveState() {
      const data = {
        markdown: markdownEl.value,
        theme: themeSelectEl.value,
        template: templateSelectEl.value,
        avatar: avatarPreviewEl.classList.contains("visible") ? avatarPreviewEl.src : ""
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        updateSaveStatus("已自动保存");
      } catch (error) {
        console.warn("保存失败", error);
        updateSaveStatus("保存失败");
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function updateSaveStatus(text = "已自动保存") {
      saveStatusEl.textContent = text;
    }

    function getResumeFileName() {
      const firstLine = markdownEl.value.split("\n").find(line => line.trim().startsWith("# "));
      const name = firstLine ? firstLine.replace(/^#\s*/, "").trim() : "简历";
      return `${name}-简历`.replace(/[\\/:*?"<>|]/g, "-").replace(/\s+/g, " ").trim();
    }
  </script>
</body>
