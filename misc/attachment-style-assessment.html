<!doctype html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>依恋类型测评</title><style>:root{--bg:#f7f3ed;--card:#fffaf3;--text:#241f1a;--muted:#71675b;--line:#e2d6c8;--accent:#8f5f35;--accent-2:#c7874b;--good:#407d56;--warn:#b36b20;--bad:#9b4c45;--shadow:0 18px 50px rgba(47, 34, 23, 0.11);--radius:22px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(199,135,75,.2),transparent 32rem),var(--bg);min-height:100vh}.wrap{width:min(1120px,calc(100% - 32px));margin:0 auto}header{padding:48px 0 24px}.hero{display:grid;grid-template-columns:1.25fr 0.75fr;gap:24px}.calc-info,.hero-card,.panel,.question,.result-card,.side-card{background:rgba(255,250,243,.88);border:1px solid rgba(226,214,200,.85);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.hero-card{padding:38px}.side-card{padding:28px;display:flex;flex-direction:column;justify-content:center;font-size:14px;color:var(--muted)}h1{margin:12px 0 14px;font-size:clamp(30px, 5vw, 48px);letter-spacing:-.02em}.panel{padding:32px;margin-top:22px}.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:18px}.mode-btn{text-align:left;padding:24px;border-radius:18px;background:#fff;border:1px solid var(--line);cursor:pointer;transition:all .2s}.mode-btn:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 10px 20px rgba(0,0,0,.05)}.mode-btn strong{display:block;font-size:20px;margin-bottom:8px;color:var(--accent)}.progress-wrap{margin:20px 0}.progress{height:8px;background:rgba(0,0,0,.05);border-radius:10px;overflow:hidden}.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:24px 0}.result-card{padding:24px;position:relative;overflow:hidden}.result-card h3{margin:0;font-size:18px;opacity:.8}.percent{font-size:48px;font-weight:900;margin:10px 0;font-variant-numeric:tabular-nums}.score-badge{display:inline-flex;align-items:center;background:rgba(143,95,53,.1);padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px}.formula-text{font-family:monospace;font-size:12px;color:var(--muted);margin-top:8px;display:block}.bar{height:8px;border-radius:10px;background:rgba(0,0,0,.05);margin:15px 0}.bar-fill{height:100%;border-radius:inherit;transition:width 1s ease-out}.secure .bar-fill{background:var(--good)}.anxious .bar-fill{background:var(--warn)}.avoidant .bar-fill{background:var(--bad)}.calc-info{margin-top:24px;padding:20px;border-left:4px solid var(--accent);background:rgba(143,95,53,.03);font-size:14px;line-height:1.6}.calc-info h4{margin:0 0 10px 0;color:var(--accent)}.calc-steps{display:flex;flex-direction:column;gap:8px}.step{display:flex;align-items:flex-start;gap:10px}.step-num{background:var(--accent);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}.summary{margin-top:24px;padding:24px;background:#fff;border-radius:18px;border:1px solid var(--line)}.btn{padding:12px 24px;border-radius:99px;border:none;cursor:pointer;font-weight:700;transition:opacity .2s;background:var(--accent);color:#fff}.btn-ghost{background:0 0;color:var(--accent);border:1px solid var(--accent)}.actions{display:flex;gap:12px;margin-top:20px}.question{padding:24px;margin-bottom:16px}.scale{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:15px}.choice{padding:10px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:13px;transition:all .2s}.choice.selected{background:var(--accent);color:#fff;border-color:var(--accent)}.hidden{display:none!important}@media (max-width:820px){.hero,.mode-grid,.result-grid{grid-template-columns:1fr}.scale{grid-template-columns:1fr 1fr}}</style></head><body><header class=wrap><div class=hero><div class=hero-card><div style=color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.1em>ATTACHMENT STYLE</div><h1>依恋类型测评</h1><p style=color:var(--muted);margin:0>探索你与伴侣在亲密关系中的安全感基调</p></div><div class=side-card>提示：结果基于您当下的主观感知。依恋类型是动态的，通过觉察与练习可以向“安全型”转变。</div></div></header><main class=wrap><section id=start class=panel><h2 style=margin-top:0>选择测评对象</h2><div class=mode-grid><button class=mode-btn onclick='startQuiz("self")'><strong>测自己</strong><span>评估你在关系中的内部工作模式</span></button><button class=mode-btn onclick='startQuiz("partner")'><strong>测对方</strong><span>评估伴侣或约会对象呈现的行为模式</span></button></div></section><section id=quiz class="panel hidden"><div style=display:flex;justify-content:space-between;align-items:center><h2 id=quizTitle style=margin:0>测评中</h2><button class="btn btn-ghost" onclick=location.reload()>返回首页</button></div><div class=progress-wrap><div style=display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px><span id=progressText>已完成 0%</span><span id=countText>0 / 0</span></div><div class=progress><div id=progressBar class=progress-bar></div></div></div><div id=questionList></div><div class=actions><button class=btn id=submitBtn onclick=showResults() style=width:100%;padding:18px>查看报告</button></div></section><section id=results class="panel hidden"><div style=display:flex;justify-content:space-between;align-items:flex-start><h2>测评分析报告</h2><div class=actions style=margin:0><button class="btn btn-ghost" onclick=copyResult()>复制结果</button><button class=btn onclick=location.reload()>返回首页</button></div></div><div class=result-grid><article class="result-card secure"><div class=score-badge id=secureRaw>原始分: --</div><h3>安全型 (Secure)</h3><div class=percent id=securePct>0%</div><div class=bar><div class=bar-fill id=secureBar></div></div><span class=formula-text id=secureFormula>计算中...</span></article><article class="result-card anxious"><div class=score-badge id=anxiousRaw>原始分: --</div><h3>焦虑型 (Anxious)</h3><div class=percent id=anxiousPct>0%</div><div class=bar><div class=bar-fill id=anxiousBar></div></div><span class=formula-text id=anxiousFormula>计算中...</span></article><article class="result-card avoidant"><div class=score-badge id=avoidantRaw>原始分: --</div><h3>回避型 (Avoidant)</h3><div class=percent id=avoidantPct>0%</div><div class=bar><div class=bar-fill id=avoidantBar></div></div><span class=formula-text id=avoidantFormula>计算中...</span></article></div><div class=calc-info><h4>📊 计分逻辑</h4><div class=calc-steps id=calcExplanation></div></div><div class=summary id=summaryText></div></section></main><script>const selfItems=[{type:"anxious",text:"我时常陷入对失去爱的恐惧中，担心伴侣最终会不再爱我或离开我。"},{type:"anxious",text:"我害怕一旦对方看清真实且不完美的我，就会失望并停止喜欢我。"},{type:"anxious",text:"单身状态让我感到焦虑和自我价值感的缺失，仿佛只有处于关系中才是完整的。"},{type:"anxious",text:"当伴侣不在身边或联系减少时，我会不由自主地怀疑他/她是否对别人产生了兴趣。"},{type:"anxious",text:"向伴侣袒露自己的缺点或担忧的事情时，我常担心对方无法共情，甚至会觉得我的情绪是种负担。"},{type:"anxious",text:"我花费大量精力反复复盘关系中的细节，思考对方的每一个举动意味着什么。"},{type:"anxious",text:"我很容易快速投入感情，在关系初期就产生强烈的依恋和绑定感。"},{type:"anxious",text:"我对伴侣的情绪变化极度敏感，常因对方细微的态度波动而心神不宁。"},{type:"anxious",text:"我深信如果这段关系结束，我将再也找不到像他/她那样的人，或者再也无人爱我。"},{type:"anxious",text:"在冲突中，我容易被情绪淹没，冲动地说出或做出事后后悔的事。"},{type:"anxious",text:"我常对自己的外貌或魅力缺乏自信，担心自己不够有吸引力以维持长久的爱。"},{type:"anxious",text:"当我在意的人关注其他人时，我会感到强烈的沮丧和被排斥感。"},{type:"anxious",text:"若约会了几个月的对象突然冷淡，我会立刻反思是不是自己做错了什么，急于通过讨好来修复关系。"},{type:"anxious",text:"面对分手时，我可能会产生让对方嫉妒或展示我价值的想法，以证明他/她错过了多么好的伴侣。"},{type:"secure",text:"我能自然、舒适地与伴侣表达亲昵，既不刻意疏远也不过度黏人。"},{type:"secure",text:"我能自在地依赖伴侣，视相互依赖为关系的常态。"},{type:"secure",text:"总体而言，我对恋爱关系感到满意和安心，没有持续的隐忧。"},{type:"secure",text:"我不需要通过反复追问或试探来确认对方的爱意，因为信任是默认的基调。"},{type:"secure",text:"我能清晰、直接地向伴侣表达我的需求和愿望，而不必担心被拒绝或嘲笑。"},{type:"secure",text:"我倾向于相信大多数人本质上是善意且可靠的，除非有确凿的反面证据。"},{type:"secure",text:"我愿意与伴侣分享深层的想法和感受（例如直白暴露自己的担忧），视这种坦诚为亲密而非风险。"},{type:"secure",text:"争吵只是解决分歧的手段，不会让我动摇对整段关系根基的信任。"},{type:"secure",text:"有时旁人觉得我的关系过于平稳无聊、缺乏戏剧性，但我享受这种宁静。"},{type:"secure",text:"即使意见不合，我也能平和坚定地表达自己的看法，而不必攻击对方或压抑自己。"},{type:"secure",text:"若在意的人关注他人，我虽可能有瞬间的嫉妒，但能迅速调节，不会因此陷入自我怀疑。"},{type:"secure",text:"若约会对象冷淡疏远，我会好奇原因，但不会经常自我反思。"},{type:"secure",text:"面对分手，我会经历悲伤，但可以走出伤痛，继续生活。"},{type:"secure",text:"我可以与前任保持健康的柏拉图式联系，认为对方适合做朋友而非伴侣，而不是认为最好不再见面联系。"},{type:"avoidant",text:"分手后我能迅速恢复平静，甚至惊讶于自己能如此快地将一个人从生活中剥离。"},{type:"avoidant",text:"当伴侣陷入负面情绪时，我感到手足无措，难以提供情感上的支持与共鸣。"},{type:"avoidant",text:"我将个人独立性和自由置于关系之上，不愿因亲密而牺牲自我空间。"},{type:"avoidant",text:"我倾向于保留内心最深处的感受，不愿完全向伴侣敞开心扉，以保持心理距离。"},{type:"avoidant",text:"依赖他人让我感到不适和虚弱，我更习惯独自处理问题和情绪。"},{type:"avoidant",text:"我常莫名地对伴侣感到烦躁、轻蔑或挑剔。"},{type:"avoidant",text:"相比深度的承诺关系，我更偏好轻松、无负担且无需过多情感投入的随意关系。"},{type:"avoidant",text:"当伴侣在身体或情感上靠得太近时，我会本能地感到紧张和想要逃离。"},{type:"avoidant",text:"伴侣期望的亲密程度常超出我的舒适区，让我感到被吞噬或压力重重。"},{type:"avoidant",text:"我处于一种矛盾中：分开时想念对方，但一旦在一起亲近，又渴望逃开找回自由。"},{type:"avoidant",text:"他人的依赖让我感到沉重和被束缚，我讨厌成为别人情感需求的承担者。"},{type:"avoidant",text:"若在意的人关注其他异性，我反而会松一口气，因为这暗示着我不必对这段关系给出唯一和排他的承诺。"},{type:"avoidant",text:"若约会对象冷淡疏远，我通常没什么感觉，甚至因不用面对亲密压力而感到解脱。"},{type:"avoidant",text:"当关系达成某种目标或变得稳定后，我反而感到空虚迷茫，不确定自己是否还想要这段关系。"}],partnerItems=[{type:"avoidant",text:"信号混乱且不一致：时而热情亲密，时而冷漠疏远，让你难以捉摸其真实心意。"},{type:"avoidant",text:"对方推崇独立，视“依赖他人”为软弱，轻视情感上的相互需要。"},{type:"avoidant",text:"习惯性地贬低你或前任，即便以玩笑口吻说出，也常带有挑剔和轻蔑意味。"},{type:"avoidant",text:"对方倾向于避免共同计划，偏好保持独处。"},{type:"avoidant",text:"严格划定边界，将你隔离在其核心社交圈之外，关系缺乏公开性。常怀疑自己处于地下恋情。"},{type:"avoidant",text:"对方对关系抱有不现实的浪漫想象，或过度理想化已失去的前任。"},{type:"avoidant",text:"对方不信任你，害怕被利用、被绑定或被占便宜。"},{type:"avoidant",text:"对关系有一套僵化且不妥协的规则，缺乏协商空间。"},{type:"avoidant",text:"面对冲突时倾向于逃避消失或突然爆发，难以开启有意义沟通。"},{type:"avoidant",text:"习惯通过暗示而非直说来表达需求，享受让你猜测的过程。"},{type:"avoidant",text:"难以明确你们的关系，关键话题被视为禁区。"},{type:"secure",text:"言行一致，可靠稳定：承诺的事情通常会做到，给你踏实感。"},{type:"secure",text:"和你一起做决定，重大议题共同商议。"},{type:"secure",text:"对方愿意坦诚讨论同居、承诺及未来生活安排。"},{type:"secure",text:"沟通顺畅且包容：即使答案不完美，也鼓励你提问。"},{type:"secure",text:"争吵旨在解决问题而非暗中较劲：事后能达成双方满意的方案。"},{type:"secure",text:"对方不害怕承诺或依赖，不会把亲密等同于被控制。"},{type:"secure",text:"对方视关系为滋养而非负担：愿意积极投入，共同经营。"},{type:"secure",text:"亲密具有正向累积效应：越亲密越安心，不会因靠近而突然疏远。"},{type:"secure",text:"主动将你纳入其生活圈：介绍给亲友，让你成为公共生活的一部分。"},{type:"secure",text:"自然表达感情，能直接清晰地表达喜欢或爱。"},{type:"secure",text:"不玩心理博弈，不故意让你猜，不通过制造嫉妒来测试感情。"},{type:"anxious",text:"对方渴望高强度亲密：关系初期便急于拉近距离，追求时刻黏在一起。"},{type:"anxious",text:"频繁流露不安全感：担心被拒绝、替代，需要大量再保证(reassurance)。"},{type:"anxious",text:"单身状态使对方焦虑：急切地寻求维持关系，难以享受独处。"},{type:"anxious",text:"使用试探性手段博取关注：如假装冷淡以测试你的反应，没被你追上则会发怒。"},{type:"anxious",text:"期望你有“读心术”：希望你通过猜测来理解其情绪需求。"},{type:"anxious",text:"倾向用情绪化行为发泄不满，而非直接沟通解决核心问题。"},{type:"anxious",text:"容易将关系中的正常中性事件解读为针对对方的负面信号。"},{type:"anxious",text:"对方起初让你主导节奏，实则内心焦灼，缺乏主动权。"},{type:"anxious",text:"对方被这段关系占据心神，复盘细节、频繁联系或防御性不联系。"},{type:"anxious",text:"有时会小心翼翼、害怕毁掉关系，认为必须很努力才能保持你的兴趣。"},{type:"anxious",text:"怀疑你可能不忠，过度警觉你的行踪、隐私或社交动态。"}];let state={mode:"",questions:[],answers:{},startTime:0};function startQuiz(t){state.mode=t,state.answers={};const e="self"===t?selfItems:partnerItems;state.questions=[...e].sort((()=>Math.random()-.5)),document.getElementById("start").classList.add("hidden"),document.getElementById("quiz").classList.remove("hidden"),document.getElementById("quizTitle").innerText="self"===t?"正在测评：我的依恋模式":"正在测评：伴侣的行为模式",renderQuestions(),updateProgress(),window.scrollTo(0,0)}function renderQuestions(){const t=document.getElementById("questionList");t.innerHTML="";const e="self"===state.mode?[{v:0,t:"不符合"},{v:1,t:"有点符合"},{v:2,t:"比较符合"},{v:3,t:"非常符合"}]:[{v:1,t:"非常不符合"},{v:2,t:"中等符合"},{v:3,t:"非常符合"}];state.questions.forEach(((n,s)=>{const a=document.createElement("div");a.className="question",a.innerHTML=`\n            <div style="font-size: 14px; color: var(--accent); font-weight: 800; margin-bottom:8px;">Q${s+1}</div>\n            <div style="font-size: 16px; line-height: 1.5; font-weight: 500;">${n.text}</div>\n            <div class="scale">\n              ${e.map((t=>`\n                <button class="choice" data-idx="${s}" data-val="${t.v}" onclick="selectAnswer(${s}, ${t.v}, this)">\n                  ${t.t}\n                </button>\n              `)).join("")}\n            </div>\n          `,t.appendChild(a)}))}function selectAnswer(t,e,n){state.answers[t]=e;n.parentElement.querySelectorAll(".choice").forEach((t=>t.classList.remove("selected"))),n.classList.add("selected"),updateProgress()}function updateProgress(){const t=Object.keys(state.answers).length,e=state.questions.length,n=Math.round(t/e*100);document.getElementById("progressBar").style.width=n+"%",document.getElementById("progressText").innerText=`已完成 ${n}%`,document.getElementById("countText").innerText=`${t} / ${e}`}function showResults(){if(Object.keys(state.answers).length<state.questions.length)return void alert("请回答完所有题目再查看报告哦。");const t={secure:0,anxious:0,avoidant:0};state.questions.forEach(((e,n)=>{t[e.type]+=state.answers[n]}));let e={...t},n="";"partner"===state.mode?(e.secure=Math.max(0,t.secure-11),e.anxious=Math.max(0,t.anxious-11),e.avoidant=Math.max(0,t.avoidant-11),n='\n            <div class="step"><span class="step-num">1</span> 汇总：汇总每个维度的得分（每类11题，得分区间11-33分）。</div>\n            <div class="step"><span class="step-num">2</span> 抵消基准：由于每题最低为1分，需减去11分基础分（基准分代表完全不符合该特征），得到实际倾向强度。</div>\n            <div class="step"><span class="step-num">3</span> 权重转化：计算各维度在总倾向强度中的占比。</div>\n          '):n='\n            <div class="step"><span class="step-num">1</span> 汇总：汇总“安全、焦虑、回避”三个维度的原始选择分数（0-3分）。</div>\n            <div class="step"><span class="step-num">2</span> 占比计算：将单维度分数除以三个维度的总分之和，得出相对百分比。</div>\n          ';const s=e.secure+e.anxious+e.avoidant,a={secure:s?Math.round(e.secure/s*100):0,anxious:s?Math.round(e.anxious/s*100):0,avoidant:s?Math.round(e.avoidant/s*100):0},o=100-(a.secure+a.anxious+a.avoidant);0!==o&&s>0&&(a.secure+=o),document.getElementById("quiz").classList.add("hidden"),document.getElementById("results").classList.remove("hidden"),document.getElementById("calcExplanation").innerHTML=n;["secure","anxious","avoidant"].forEach((e=>{document.getElementById(`${e}Raw`).innerText=`原始分: ${t[e]}`,document.getElementById(`${e}Pct`).innerText=`${a[e]}%`,document.getElementById(`${e}Bar`).style.width=`${a[e]}%`,"partner"===state.mode?document.getElementById(`${e}Formula`).innerText=`(${t[e]} - 11基准) / ${s}总倾向`:document.getElementById(`${e}Formula`).innerText=`${t[e]}原始分 / ${s}总分之和`}));const i=Object.entries(a).sort(((t,e)=>e[1]-t[1])),u=i[0];let x=`当前呈现出的最主要倾向是 <span style="color:var(--accent)">${"secure"===u[0]?"安全型":"anxious"===u[0]?"焦虑型":"回避型"}</span> (${u[1]}%)。`;i[0][1]-i[1][1]<20&&(x+="<br><strong>多重混合：</strong>结果中多种依恋特征比例接近，这说明在不同情境下，行为模式可能发生切换。"),document.getElementById("summaryText").innerHTML=x,window.scrollTo(0,0)}function copyResult(){const t=`依恋类型测评结果：安全型 ${document.getElementById("securePct").innerText}，焦虑型 ${document.getElementById("anxiousPct").innerText}，回避型 ${document.getElementById("avoidantPct").innerText}。`;navigator.clipboard.writeText(t).then((()=>alert("解析报告摘要已复制到剪贴板")))}</script></body></html>
