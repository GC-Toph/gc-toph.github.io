<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image -> PPTX</title>
  <script src="https://cdn.jsdelivr.net/npm/json5@2.2.3/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #15171a;
      --muted: #68707d;
      --line: #d8dde6;
      --accent: #2f6fed;
      --danger: #c93c37;
      --ok: #217346;
      --warn: #946200;
      --code: #f3f5f8
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text)
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd0d9;
      border-radius: 4px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a1a9b5
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel)
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.25
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45
    }

    main {
      display: grid;
      grid-template-columns: 460px 1fr 460px;
      gap: 0;
      padding: 0
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
      display: flex;
      flex-direction: column;
      min-height: 0
    }

    .panel h2 {
      margin: 0;
      padding: 13px 14px;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0
    }

    .panel-body {
      padding: 14px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      min-height: 0
    }

    label {
      display: block;
      font-weight: 650;
      font-size: 12px;
      margin: 0 0 6px
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 6px 0 12px
    }

    .pill {
      display: inline-block;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap
    }

    .stat {
      font-size: 11px;
      color: #667085;
      margin-left: 8px
    }

    textarea {
      width: 100%;
      flex-grow: 1;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      outline: none;
      background: #fff;
      min-height: 360px
    }

    #promptText {
      min-height: 360px;
      background: #fcfdff
    }

    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, .12)
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fbfcfd
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      flex-shrink: 0
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 6px 8px;
      font-weight: 650;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    button:hover:not(:disabled) {
      filter: brightness(.95)
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word
    }

    #status.error {
      color: var(--danger)
    }

    #status.ok {
      color: var(--ok)
    }

    #status.warn {
      color: var(--warn)
    }

    .preview-wrap {
      padding: 18px;
      overflow: auto;
      height: calc(100vh - 112px)
    }

    #preview {
      position: relative;
      width: min(100%, 1066px);
      aspect-ratio: 16/9;
      background: #fff;
      border: 1px solid #ccd2dc;
      margin: 0 auto;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .12);
      overflow: hidden;
      container-type: inline-size
    }

    .el {
      position: absolute;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: normal
    }

    .placeholder {
      display: grid;
      place-items: center;
      border: 1px dashed #a8b0bc;
      background: repeating-linear-gradient(45deg, #f4f6f8, #f4f6f8 8px, #eef1f5 8px, #eef1f5 16px);
      color: #667085;
      text-align: center;
      padding: 8px
    }

    .table {
      border-collapse: collapse;
      width: 100%;
      height: 100%;
      table-layout: fixed
    }

    .table td {
      border: 1px solid #cfd6e0;
      padding: 4px 6px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .usage {
      overflow: auto
    }

    .usage ol {
      padding-left: 18px;
      margin: 8px 0 14px
    }

    .usage li {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.45
    }

    .usage code {
      background: var(--code);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 12px
    }

    .mini {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0 2px
    }

    .mini div {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fbfcfd;
      font-size: 12px;
      color: var(--muted)
    }

    @media(max-width:1360px) {
      main {
        grid-template-columns: 460px 1fr
      }

      .usage-panel {
        grid-column: 1/-1
      }

      #promptText {
        min-height: 260px
      }

      .preview-wrap {
        height: auto
      }
    }

    @media(max-width:940px) {
      main {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Image -> PPTX</h1>
  </header>
  <main>
    <section class="panel">
      <h2>输入 <span class="pill">image-layout-pptx-v2</span></h2>
      <div class="panel-body">
        <label for="jsonInput">Layout JSON <span id="schemaStats" class="stat"></span></label><textarea id="jsonInput"
          spellcheck="false"></textarea>
        <div class="actions"><button id="loadSample">填入示例</button><button id="formatJson">格式化</button><button
            id="validateBtn">校验 / 预览</button><button id="downloadJson">下载 JSON</button><button id="makePptx"
            class="primary">生成 PPTX</button></div>
        <div id="status">等待输入。</div>
      </div>
    </section>
    <section class="panel">
      <h2>HTML 预览</h2>
      <div class="preview-wrap"><label for="slideSelect">预览页面</label><select id="slideSelect"></select>
        <p class="hint">预览用于快速校对版式；最终 PPTX 会使用 PptxGenJS 的原生属性生成。</p>
        <div id="preview"></div>
      </div>
    </section>
    <section class="panel usage-panel">
      <h2>LLM Prompt / 用法</h2>
      <div class="panel-body usage">
        <textarea id="promptText" readonly spellcheck="false"></textarea>
        <div class="actions"><button id="copyPrompt">复制 Prompt</button></div>
        <div class="mini">
        </div>
        <ol>
          <li>附上要还原的图片或设计需求发给 LLM。</li>
          <li>要求返回符合 <code>image-layout-pptx-v2</code> 的纯 JSON。</li>
          <li>粘贴到左侧点击「校验 / 预览」，再「生成 PPTX」。</li>
        </ol>
      </div>
    </section>
  </main>
  <script>
    const $ = id => document.getElementById(id); let currentLayout = null, currentSlideIndex = 0;

    const llmPrompt = `You are an image-to-editable-PowerPoint layout generation engine.

Return ONE valid JSON object only. No Markdown. No code fences. No explanations.

Goal: recreate the provided image/design as an editable PowerPoint deck with maximum visual fidelity.
Use native PowerPoint/PptxGenJS objects wherever possible.

Priority order:
1. Editable text boxes with exact typography, margins, alignment, line spacing, character spacing, and rich text runs.
2. Native shapes and lines for cards, panels, dividers, arrows, badges, geometric diagrams, backgrounds.
3. Native tables for grids, comparison tables, schedules, metric tables.
4. Native charts for simple bar/line/pie/doughnut charts when values can be inferred.
5. Inline SVG only for complex icons/illustrations that cannot be represented with native shapes.
6. Placeholder only when the visual cannot be reconstructed reliably.

Coordinate system:
- x, y, w, h are normalized from 0 to 1 relative to slide width/height.
- Elements are rendered in array order. Later elements appear above earlier elements.
- Use many small elements when needed for fidelity. Do not merge important text into SVG.
- Use 6-character hex colors only, for example '#FFFFFF'. No rgba(), rgb(), CSS names, or 3-digit hex.
- transparency is 0-100, where 0 is opaque and 100 is fully transparent.
- opacity is 0-1 and may be used at element level.

Schema:
{
  "schema": "image-layout-pptx-v2",
  "deck": {
    "title": "Generated deck",
    "subject": "Image recreation",
    "author": "AI",
    "company": "",
    "lang": "zh-CN",
    "slideSize": { "width": 13.333, "height": 7.5 },
    "theme": {
      "headFontFace": "Aptos Display",
      "bodyFontFace": "Aptos",
      "lang": "zh-CN",
      "colors": { "text": "#111111", "background": "#FFFFFF", "accent1": "#2F6FED" }
    }
  },
  "slides": [
    {
      "id": "slide_001",
      "section": "Main",
      "background": { "type": "solid", "color": "#FFFFFF" },
      "notes": ["Optional speaker note"],
      "elements": []
    }
  ]
}

Common element fields:
{
  "id": "unique_name",
  "type": "text | shape | line | svg | placeholder | table | chart | image",
  "x": 0.1, "y": 0.1, "w": 0.3, "h": 0.1,
  "rotation": 0,
  "opacity": 1,
  "flipH": false,
  "flipV": false,
  "alt": "short accessibility description",
  "hyperlink": { "url": "https://example.com", "tooltip": "Open" }
}

Text element:
{
  "id": "title_1", "type": "text", "role": "title",
  "x": 0.07, "y": 0.08, "w": 0.72, "h": 0.12,
  "text": "Text content",
  "richText": [
    { "text": "Bold ", "options": { "bold": true } },
    { "text": "accent", "options": { "color": "#2F6FED", "italic": true } }
  ],
  "style": {
    "fontFace": "Aptos", "fontSize": 30, "bold": true, "italic": false,
    "color": "#111111", "highlight": "#FFF2CC", "transparency": 0,
    "align": "left", "valign": "top", "margin": [0,0,0,0],
    "lineSpacingMultiple": 0.95, "lineSpacing": 22, "charSpacing": -1,
    "fit": "shrink", "wrap": true,
    "breakLine": false,
    "bullet": false,
    "underline": false,
    "strike": false,
    "subscript": false,
    "superscript": false,
    "fill": { "color": "#FFFFFF", "transparency": 100 },
    "line": { "color": "#FFFFFF", "width": 0, "transparency": 100 },
    "shadow": { "type": "outer", "color": "#000000", "opacity": 0.16, "blur": 2, "angle": 45, "distance": 1 },
    "glow": { "color": "#2F6FED", "opacity": 0.35, "size": 1 }
  }
}
Use richText for mixed formatting. For bullet lists, use richText array items with options.bullet and options.breakLine. Do not use Unicode bullet characters unless the original image visibly contains them as literal text.

Shape element:
{
  "id": "card_1", "type": "shape", "shape": "rect | roundRect | ellipse | triangle | arc | chevron | pentagon | hexagon | diamond | parallelogram | trapezoid | cloud | star5",
  "x": 0.07, "y": 0.25, "w": 0.36, "h": 0.35,
  "style": {
    "fill": { "color": "#F4F7FB", "transparency": 0 },
    "line": { "color": "#D8DEE9", "width": 1, "transparency": 50, "dash": "solid" },
    "radius": 0.025,
    "shadow": { "type": "outer", "color": "#000000", "opacity": 0.10, "blur": 3, "angle": 45, "distance": 1 }
  }
}

Line element:
{
  "id": "line_1", "type": "line",
  "x": 0.07, "y": 0.22, "w": 0.86, "h": 0,
  "style": { "line": { "color": "#D8DEE9", "width": 1, "dash": "solid", "beginArrowType": "none", "endArrowType": "none" } }
}

Table element:
{
  "id": "table_1", "type": "table",
  "x": 0.08, "y": 0.35, "w": 0.84, "h": 0.35,
  "colW": [0.28, 0.28, 0.28],
  "rowH": [0.08, 0.09, 0.09],
  "rows": [
    [ { "text": "Metric", "options": { "bold": true, "fill": { "color": "#EEF4FF" } } }, { "text": "Q1" } ],
    [ "Revenue", "$10M" ]
  ],
  "style": { "fontFace": "Aptos", "fontSize": 10, "color": "#111111", "align": "center", "valign": "mid", "margin": 0.04, "border": { "color": "#CFD6E0", "width": 1 } }
}

Chart element:
{
  "id": "chart_1", "type": "chart", "chartType": "bar | col | line | pie | doughnut",
  "x": 0.52, "y": 0.22, "w": 0.36, "h": 0.38,
  "data": [ { "name": "Series 1", "labels": ["A", "B", "C"], "values": [10, 20, 15] } ],
  "style": { "showLegend": false, "showValue": false, "showCategoryName": false, "catAxisLabelFontFace": "Aptos", "catAxisLabelFontSize": 8, "valAxisLabelFontSize": 8, "showCatName": true, "showValAxis": true, "showCatAxis": true, "colors": ["#2F6FED", "#7AA2FF"] }
}
Only use chart when the underlying values can be reasonably inferred. Otherwise use native shapes/SVG.

SVG element:
{
  "id": "svg_1", "type": "svg",
  "x": 0.55, "y": 0.22, "w": 0.34, "h": 0.36,
  "svg": "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 240'><rect width='400' height='240' rx='24' fill='#EEF4FF'/></svg>",
  "alt": "simplified visual"
}
SVG rules: use single quotes for all SVG attributes inside the JSON string, include xmlns and viewBox, no external image/script/href/event handlers.

Placeholder element:
{ "id":"photo_1", "type":"placeholder", "x":0.55, "y":0.22, "w":0.34, "h":0.36, "label":"Photo manually added here" }

Fidelity checklist before final JSON:
- Extract every visible heading, label, number, axis label, caption, footnote as editable text.
- Match hierarchy with fontSize, bold, weight, color, lineHeight/lineSpacingMultiple.
- Recreate cards, dividers, chips, shadows, rounded corners, transparency, and arrows with native shapes/lines.
- Preserve alignment: use margin: 0 for tightly aligned labels.
- Split mixed-color/mixed-weight text into richText runs.
- Use table/chart objects when the image contains a real table/chart.
- Keep all coordinates within 0..1.
`;

    const sampleLayout = {
      schema: "image-layout-pptx-v2", deck: { title: "layout", subject: "Image recreation", author: "AI", company: "", lang: "zh-CN", slideSize: { width: 13.333, height: 7.5 }, theme: { headFontFace: "Aptos Display", bodyFontFace: "Aptos", lang: "zh-CN", colors: { text: "#111111", background: "#FFFFFF", accent1: "#2F6FED" } } }, slides: [{
        id: "slide_001", section: "Main", background: { type: "solid", color: "#FFFFFF" }, notes: ["Generated with enhanced PptxGenJS mapping."], elements: [
          { id: "bg_band", type: "shape", shape: "rect", x: 0, y: 0, w: 1, h: 0.22, style: { fill: { color: "#EEF4FF", transparency: 0 }, line: { color: "#EEF4FF", width: 0, transparency: 100 } } },
          { id: "title", type: "text", role: "title", x: 0.06, y: 0.07, w: 0.72, h: 0.08, text: "image → layout JSON → editable PPTX", style: { fontFace: "Aptos Display", fontSize: 28, bold: true, color: "#101828", align: "left", valign: "top", margin: [0, 0, 0, 0], fit: "shrink", charSpacing: -1 } },
          { id: "subtitle", type: "text", role: "subtitle", x: 0.06, y: 0.155, w: 0.63, h: 0.055, richText: [{ text: "v2 uses ", options: { color: "#475467" } }, { text: "richText / shadows / charts / tables", options: { bold: true, color: "#2F6FED" } }, { text: " for better fidelity.", options: { color: "#475467" } }], style: { fontFace: "Aptos", fontSize: 12, color: "#475467", margin: [0, 0, 0, 0], fit: "shrink" } },
          { id: "card_1", type: "shape", shape: "roundRect", x: 0.06, y: 0.29, w: 0.37, h: 0.43, style: { fill: { color: "#F8FAFC", transparency: 0 }, line: { color: "#D8DEE9", width: 1, transparency: 0 }, radius: 0.025, shadow: { type: "outer", color: "#000000", opacity: 0.10, blur: 2, angle: 45, distance: 1 } } },
          { id: "metric", type: "text", x: 0.09, y: 0.33, w: 0.28, h: 0.07, richText: [{ text: "保真度 ", options: { color: "#344054" } }, { text: "+42%", options: { bold: true, color: "#217346" } }], style: { fontSize: 18, bold: false, margin: [0, 0, 0, 0], fit: "shrink" } },
          { id: "bullets", type: "text", x: 0.095, y: 0.43, w: 0.29, h: 0.20, richText: [{ text: "Native text runs", options: { bullet: { type: "bullet" }, breakLine: true } }, { text: "Shape shadows and dashed lines", options: { bullet: { type: "bullet" }, breakLine: true } }, { text: "Editable charts and tables", options: { bullet: { type: "bullet" } } }], style: { fontSize: 12, color: "#344054", margin: [0.02, 0, 0, 0.06], fit: "shrink", lineSpacingMultiple: 1.05 } },
          { id: "chart_1", type: "chart", chartType: "col", x: 0.52, y: 0.30, w: 0.36, h: 0.36, data: [{ name: "Fidelity", labels: ["Text", "Shape", "Chart", "Table"], values: [72, 84, 78, 88] }], style: { showLegend: false, showValue: false, showCatName: true, showValAxis: true, showCatAxis: true, catAxisLabelFontFace: "Aptos", catAxisLabelFontSize: 8, valAxisLabelFontSize: 8, colors: ["#2F6FED"] } },
          { id: "arrow", type: "line", x: 0.445, y: 0.505, w: 0.055, h: 0, style: { line: { color: "#98A2B3", width: 2, dash: "solid", endArrowType: "triangle" } } },
          { id: "foot", type: "text", x: 0.06, y: 0.86, w: 0.78, h: 0.05, text: "Tip: use margin: 0 and fit: shrink for pixel-like alignment.", style: { fontSize: 10, color: "#667085", margin: [0, 0, 0, 0] } }
        ]
      }]
    };

    $("jsonInput").value = JSON.stringify(sampleLayout, null, 2); $("promptText").value = llmPrompt;
    $("loadSample").onclick = async () => { $("jsonInput").value = JSON.stringify(sampleLayout, null, 2); await validateAndPreview() }; $("formatJson").onclick = formatJson; $("validateBtn").onclick = validateAndPreview; $("downloadJson").onclick = downloadJson; $("copyPrompt").onclick = copyPrompt; $("makePptx").onclick = () => { const b = $("makePptx"); b.disabled = true; b.textContent = "处理中..."; setTimeout(() => generatePptx().finally(() => { b.disabled = false; b.textContent = "生成 PPTX" }), 50) }; $("slideSelect").onchange = async e => { currentSlideIndex = Number(e.target.value || 0); if (currentLayout) await renderPreview(currentLayout, currentSlideIndex) };

    function fixLlmJsonErrors(rawText) { let text = rawText.trim(); text = text.replace(/^```(?:json)?/im, '').replace(/```$/m, '').trim(); text = text.replace(/"svg"\s*:\s*"([\s\S]*?<\/svg>)"/gi, (m, svg) => { let s = svg.replace(/\\"/g, '"').replace(/"/g, "'").replace(/\r?\n/g, ' '); return `"svg": "${s}"` }); return text }
